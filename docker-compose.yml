services:
  # Vector Learn app (frontend + backend + PGlite)
  app:
    build: .
    container_name: vector_learn_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_PATH: /app/.pglite
      AUTH_SECRET: ${AUTH_SECRET:-CHANGE_ME_IN_PRODUCTION_minimum_32_chars}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://app.vectorlearn.io}
    volumes:
      - vector_learn_data:/app/.pglite
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  vector_learn_data:
